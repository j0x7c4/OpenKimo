name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------
  # Frontend: lint + typecheck + build
  # -----------------------------------------------------------------
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kimi-cli/web
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kimi-cli/web/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  # -----------------------------------------------------------------
  # Backend: lint + typecheck + test
  # -----------------------------------------------------------------
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kimi-cli
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright typecheck
        run: uv run pyright src/kimi_cli/web/

      - name: Tests
        run: uv run pytest ../tests/ -v --tb=short

  # -----------------------------------------------------------------
  # Docker: verify images build successfully
  # -----------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build gateway image
        run: docker build -f Dockerfile.gateway -t kimi-agent-gateway:ci .
